syntax = "proto3";

package utility_protobuf;

//所有int32都有可能是以下类型: int32,int64,uint32,uint64,sint32,sint64,bool,enum

message InitReqMessage {
	int32 expire_timestamp = 1;	//过期时间戳 (代码中设为2840115661, 即2060.01.01 01:01:01)
	int32 type = 2;				//固定为1
}

message InitRespMessage {
	int32 status = 1;			//初始化状态, WeChatWin.dll并没有处理这个消息
}

message ResampleImageReqMessage{
	string decode_pic = 1;		//输出解码图片的路径
	string encode_pic = 2;		//输入加密图片的路径
	int32 re_pic_x = 3;			//目标图片宽度
	int32 re_pic_y = 4;			//目标图片高度
	int32 resample_flag = 5;	//固定为1
}

message ResampleImageRespMessage {
	int32 err_code = 1;			//错误码, 0=成功, 8=失败
}

message TextScanMessage {
	int32 text_scan_id = 1;		//文字扫描任务ID
	string pic_path = 2;		//扫描的图片路径
	int32 have_text = 3;		//是否检测到文字
	int32 text_scan_flag = 4;	//未知
	float rate = 5;				//文字检测置信度, 无文字时为0.0
}

//当使用图片时发送的是1 2(可为空) 3 7 8 9项
//当在截图中框选时发送的是 4 5 6 7 8 9项
message QRScanReqMessage {
	string origin_pic = 1;		//原始图片路径 可选 (图片文件扫描时使用)
	string decode_pic = 2;		//解码后的图片路径 可选 (可为空)
	int32 scan_mode = 3;		//固定为0 可选
	bytes encode_pic_data = 4;	//编码后的图片数据 可选 (截图框选时使用)
	int32 encode_pic_x = 5;		//编码图片宽度 可选
	int32 encode_pic_y = 6;		//编码图片高度 可选
	int32 enable_qr = 7;		//固定为1
	int32 text_scan_id = 8;		//文字扫描任务ID
	int32 enable_text_scan = 9;	//固定为1
}

message QRScanRespMessage {
	message QRScanResult{
		bytes result = 1;			//二维码识别结果 (UTF8字符串)
		int32 qr_type = 2;			//二维码类型标识, 一般为19
		double pos_x = 3;			//二维码定位坐标X
		double pos_y = 4;			//二维码定位坐标Y
		int32 qr_version = 5;		//一般为1
	}

	repeated QRScanResult qr_result = 1;	//二维码识别结果列表 (支持多个二维码)
	int32 result_flag = 2;			//一般为1
}